version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agendaops}
      TZ: Europe/Istanbul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: always
    # --reload kapalı: Windows + bind mount altında WatchFiles sık worker restart'ı
    # → tarayıcıda ERR_EMPTY_RESPONSE / connection reset. Geliştirici reload için:
    # docker compose run --rm -p 8000:8000 api uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Periyodik X/RSS/YouTube çekimi için worker ile birlikte celery-beat gerekir (tam yığın: docker compose up).
  worker:
    build: .
    restart: always
    command: >
      celery -A app.core.celery_app worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=50
      -Q celery
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    restart: always
    # --pidfile kaldırıldı: restart ile aynı katmanda stale pid dosyası Beat'i sürekli code 73 ile düşürüyordu.
    command:
      - sh
      - -c
      - rm -f /tmp/celerybeat.pid && exec celery -A app.core.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started

  flower:
    build: .
    restart: always
    command: celery -A app.core.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data: