<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaOps | Sistem Hatası</title>
    {% include 'includes/karargah_material_shell.html' %}
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="karargah-ui k-app-shell min-h-screen flex items-center justify-center p-4 relative">
    <button type="button" data-karargah-theme-toggle class="k-theme-toggle fixed top-4 right-4 z-10" title="Gündüz / Gece modu" aria-label="Gündüz veya gece temasına geç">
        <span data-theme-icon="sun" class="hidden" aria-hidden="true">☀️</span>
        <span data-theme-icon="moon" aria-hidden="true">🌙</span>
    </button>
    <div class="max-w-md w-full p-8 bg-white rounded-xl border border-[#dadce0] shadow-sm text-center">
        <div class="w-20 h-20 bg-[#fce8e6] rounded-full flex items-center justify-center mx-auto mb-6 border border-[#fad2cf]">
            <span class="text-4xl">⚠️</span>
        </div>
        <h1 class="text-2xl font-bold text-[#202124] mb-4">Sistem Hatası</h1>
        <p class="text-[#5f6368] mb-8 leading-relaxed">{{ message }}</p>
        
        {% if action_url %}
        <a href="{{ action_url }}" class="inline-block bg-[#1a73e8] hover:bg-[#1557b0] text-white font-bold py-3 px-8 rounded-lg transition-all shadow-sm border border-[#dadce0]">
            {{ action_text }}
        </a>
        {% else %}
        <button onclick="window.location.reload()" class="inline-block bg-[#f1f3f4] hover:bg-[#e8eaed] text-[#202124] font-bold py-3 px-8 rounded-lg transition-all border border-[#dadce0]">
            Sayfayı Yenile
        </button>
        {% endif %}
        
        <p class="mt-8 text-[10px] text-[#5f6368] uppercase tracking-widest font-bold italic">Karargah Sistem İzleme Birimi</p>
    </div>
</body>
</html>
