<script>
(function () {
  try {
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark-mode');
    }
  } catch (e) {}
})();
(function () {
  var KEY = 'theme';
  window.KarargahTheme = {
    key: KEY,
    isDark: function () {
      return document.documentElement.classList.contains('dark-mode');
    },
    setDark: function (d) {
      document.documentElement.classList.toggle('dark-mode', !!d);
      try {
        localStorage.setItem(KEY, d ? 'dark' : 'light');
      } catch (e) {}
      if (window.mermaid) {
        try {
          mermaid.initialize({
            startOnLoad: false,
            theme: d ? 'dark' : 'default',
            securityLevel: 'loose',
          });
        } catch (e) {}
      }
      try {
        window.dispatchEvent(
          new CustomEvent('karargah-themechange', { detail: { dark: !!d } })
        );
      } catch (e) {}
      this._updateAllToggleIcons();
    },
    toggle: function () {
      this.setDark(!this.isDark());
    },
    _updateAllToggleIcons: function () {
      var dark = this.isDark();
      document
        .querySelectorAll('[data-karargah-theme-toggle]')
        .forEach(function (btn) {
          var sun = btn.querySelector('[data-theme-icon="sun"]');
          var moon = btn.querySelector('[data-theme-icon="moon"]');
          if (!sun || !moon) return;
          if (dark) {
            sun.classList.remove('hidden');
            moon.classList.add('hidden');
          } else {
            sun.classList.add('hidden');
            moon.classList.remove('hidden');
          }
        });
    },
    bindToggle: function (btn) {
      if (!btn) return;
      var self = this;
      btn.addEventListener('click', function () {
        self.toggle();
      });
    },
    initDocumentToggles: function () {
      document
        .querySelectorAll('[data-karargah-theme-toggle]')
        .forEach(function (b) {
          KarargahTheme.bindToggle(b);
        });
      this._updateAllToggleIcons();
    },
  };
  function runInit() {
    if (window.KarargahTheme) KarargahTheme.initDocumentToggles();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runInit);
  } else {
    runInit();
  }
})();
</script>
