<div id="view-newsradar" class="view-section flex-1 flex flex-col w-full overflow-y-auto p-6 z-10 relative scroll-smooth">
    <div class="bg-panel rounded-xl border border-slate-800 shadow-lg p-6 max-w-4xl mx-auto w-full">
        <h3 class="text-xl font-bold text-white mb-2 flex items-center gap-2">Medya Radarı</h3>
        <p class="text-slate-400 text-sm mb-6">Kelime veya konu girin; sistem Google Haberler RSS ile (<code class="text-xs bg-dark px-1 rounded">news.google.com/rss/search?q=…&amp;hl=tr&amp;gl=TR&amp;ceid=TR:tr</code>) canlı başlık çeker ve yapay zekâ ile özetler. Veritabanında haber yoksa da çalışır.</p>
        <div class="flex gap-4 mb-6">
            <input type="text" id="newsKeyword" placeholder="Örn: Fenerbahçe, Erken Seçim, Enflasyon..." class="flex-1 bg-dark border border-slate-700 text-white rounded-lg px-4 py-3 focus:border-warning outline-none">
            <button id="btnNewsScan" onclick="window.AgendaOps.runNewsScan()" class="bg-warning hover:bg-yellow-600 text-slate-900 font-bold px-6 py-3 rounded-lg transition-colors">Taramayı Başlat</button>
        </div>
        <div id="news-loader" class="hidden flex flex-col items-center justify-center py-10 text-warning"><div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-warning mb-3"></div><p class="animate-pulse text-sm">Haberler analiz ediliyor...</p></div>
        <div id="news-results" class="hidden bg-dark/50 border border-slate-700 p-6 rounded-lg text-slate-300 text-sm leading-relaxed"></div>
    </div>
</div>
