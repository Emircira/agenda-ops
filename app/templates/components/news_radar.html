<div id="view-newsradar" class="view-section flex-1 flex flex-col w-full overflow-y-auto p-6 z-10 relative scroll-smooth bg-[#f8f9fa]">
    <div class="bg-panel rounded-xl border border-slate-800 shadow-lg p-6 max-w-4xl mx-auto w-full">
        <h3 class="text-xl font-bold text-[#202124] mb-2 flex items-center gap-2">Medya Radarı</h3>
        <p class="text-[#5f6368] text-sm mb-6">Kelime veya konu girin; sistem Google Haberler RSS ile (<code class="text-xs bg-[#f1f3f4] px-1.5 py-0.5 rounded border border-[#dadce0] text-[#1967d2]">news.google.com/rss/search?q=…&amp;hl=tr&amp;gl=TR&amp;ceid=TR:tr</code>) canlı başlık çeker ve yapay zekâ ile özetler. Veritabanında haber yoksa da çalışır.</p>
        <div class="flex gap-4 mb-6 flex-wrap">
            <input type="text" id="newsKeyword" placeholder="Örn: Fenerbahçe, Erken Seçim, Enflasyon..." class="flex-1 min-w-[200px] bg-white border border-[#dadce0] text-[#202124] rounded-lg px-4 py-3 focus:border-[#b06000] focus:ring-1 focus:ring-amber-200 outline-none">
            <button id="btnNewsScan" onclick="window.AgendaOps.runNewsScan()" class="bg-[#fef7e0] hover:bg-[#fde293] text-[#b06000] font-bold px-6 py-3 rounded-lg transition-colors border border-[#fde293]">Taramayı Başlat</button>
        </div>
        <div id="news-loader" class="hidden flex flex-col items-center justify-center py-10 text-[#b06000]"><div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-[#b06000] mb-3"></div><p class="animate-pulse text-sm">Haberler analiz ediliyor...</p></div>
        <div id="news-results" class="hidden bg-[#f8f9fa] border border-[#dadce0] p-6 rounded-lg text-[#3c4043] text-sm leading-relaxed"></div>
    </div>
</div>
