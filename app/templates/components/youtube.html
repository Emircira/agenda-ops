<div id="view-youtube" class="view-section flex-1 flex flex-col w-full overflow-y-auto p-6 z-10 relative scroll-smooth">
    <div class="bg-panel rounded-xl border border-slate-800 shadow-lg p-5 mb-4">
        <h3 class="text-white font-medium mb-3 flex items-center gap-2"><span class="text-[#FF0000]">▶</span> YouTube Konu Analizi</h3>
        <div class="flex gap-3 mb-3">
            <input type="text" id="ytKeyword" placeholder="Konu veya kelime girin (Örn: ekonomi, mülteci)..." class="flex-1 bg-dark border border-slate-700 text-white rounded-lg px-4 py-2.5 text-sm focus:border-[#FF0000]/50 outline-none">
            <button onclick="window.AgendaOps.runPlatformAnalyze('youtube', 'ytKeyword', 'yt-analyze-result', this)" class="bg-[#FF0000]/20 text-[#FF0000] border border-[#FF0000]/30 hover:bg-[#FF0000]/40 text-xs px-5 py-2.5 rounded-lg font-bold transition-colors">🧠 Analiz Et</button>
            <button onclick="window.AgendaOps.runWorkerAction('youtube', this)" class="bg-slate-700 hover:bg-slate-600 text-white text-xs px-4 py-2.5 rounded-lg font-bold transition-colors">🔄 Veri Çek</button>
        </div>
        <div id="yt-analyze-result" class="hidden bg-dark/50 border border-slate-700 p-5 rounded-lg text-slate-300 text-sm leading-relaxed max-h-[500px] overflow-y-auto custom-scrollbar"></div>
    </div>
    <div class="bg-panel rounded-xl border border-slate-800 shadow-lg flex flex-col flex-1 min-h-[300px]">
        <div class="p-4 border-b border-slate-800 bg-slate-900/40"><h3 class="text-white font-medium">YouTube Ham Veri Akışı</h3></div>
        <div id="stream-youtube" class="flex-1 overflow-y-auto p-4 space-y-3 bg-dark/20 custom-scrollbar max-h-[min(500px,calc(100vh-14rem))]">
            {% for item in contents if item.platform == 'youtube' or item.platform == 'youtube_comment' %}
            <div class="p-4 bg-panel/80 rounded-lg border border-slate-700/60"><span class="text-white text-sm font-semibold mb-2 block">{{ item.author_name }}</span><p class="text-sm text-slate-300">{{ item.text }}</p></div>
            {% endfor %}
        </div>
    </div>
</div>
