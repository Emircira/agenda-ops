<div id="view-youtube" class="view-section flex-1 flex flex-col w-full min-h-0 p-6 z-10 relative scroll-smooth bg-[#f8f9fa]">
    <div class="bg-panel rounded-xl border border-slate-800 shadow-lg p-5 mb-4">
        <h3 class="text-[#202124] font-medium mb-3 flex items-center gap-2"><span class="text-[#FF0000]">▶</span> YouTube Konu Analizi</h3>
        <div class="flex gap-3 mb-3 flex-wrap">
            <input type="text" id="ytKeyword" placeholder="Konu veya kelime girin (Örn: ekonomi, mülteci)..." class="flex-1 min-w-[200px] bg-white border border-[#dadce0] text-[#202124] rounded-lg px-4 py-2.5 text-sm focus:border-[#FF0000]/60 focus:ring-1 focus:ring-red-200 outline-none">
            <button onclick="window.AgendaOps.runPlatformAnalyze('youtube', 'ytKeyword', 'yt-analyze-result', this)" class="bg-[#fce8e6] text-[#c5221f] border border-[#fad2cf] hover:bg-[#fad2cf] text-xs px-5 py-2.5 rounded-lg font-bold transition-colors">🧠 Analiz Et</button>
            <button onclick="window.AgendaOps.runWorkerAction('youtube', this)" class="bg-[#f1f3f4] hover:bg-[#e8eaed] text-[#202124] text-xs px-4 py-2.5 rounded-lg font-bold transition-colors border border-[#dadce0]">🔄 Veri Çek</button>
        </div>
        <div id="yt-analyze-result" class="hidden bg-[#f8f9fa] border border-[#dadce0] p-5 rounded-lg text-[#3c4043] text-sm leading-relaxed max-h-[500px] overflow-y-auto custom-scrollbar"></div>
    </div>
    <div class="bg-panel rounded-xl border border-slate-800 shadow-lg flex flex-col flex-1 min-h-0 overflow-hidden">
        <div class="p-4 border-b border-[#dadce0] bg-[#f8f9fa]"><h3 class="text-[#202124] font-medium text-sm">YouTube Ham Veri Akışı</h3></div>
        <div id="stream-youtube" class="flex-1 overflow-y-auto p-4 space-y-2 k-stream-well custom-scrollbar max-h-[min(500px,calc(100vh-14rem))]">
            {% for item in contents if item.platform == 'youtube' or item.platform == 'youtube_comment' %}
            <div class="k-list-row"><span class="text-[#202124] text-sm font-semibold mb-2 block">{{ item.author_name }}</span><p class="text-sm text-[#3c4043] leading-relaxed">{{ item.text }}</p></div>
            {% endfor %}
        </div>
    </div>
</div>
