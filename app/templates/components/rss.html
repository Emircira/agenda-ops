<div id="view-rss" class="view-section flex-1 flex flex-col w-full overflow-y-auto p-6 z-10 relative scroll-smooth">
    <div class="bg-panel rounded-xl border border-slate-800 shadow-lg p-5 mb-4">
        <h3 class="text-white font-medium mb-3 flex items-center gap-2">📰 RSS Haber Konu Analizi</h3>
        <div class="flex gap-3 mb-3">
            <input type="text" id="rssKeyword" placeholder="Konu veya kelime girin (Örn: enflasyon, seçim)..." class="flex-1 bg-dark border border-slate-700 text-white rounded-lg px-4 py-2.5 text-sm focus:border-slate-500 outline-none">
            <button onclick="window.AgendaOps.runPlatformAnalyze('rss', 'rssKeyword', 'rss-analyze-result', this)" class="bg-slate-600/30 text-slate-200 border border-slate-500/30 hover:bg-slate-500/40 text-xs px-5 py-2.5 rounded-lg font-bold transition-colors">🧠 Analiz Et</button>
            <button onclick="window.AgendaOps.runWorkerAction('rss', this)" class="bg-slate-700 hover:bg-slate-600 text-white text-xs px-4 py-2.5 rounded-lg font-bold transition-colors">🔄 Veri Çek</button>
        </div>
        <div id="rss-analyze-result" class="hidden bg-dark/50 border border-slate-700 p-5 rounded-lg text-slate-300 text-sm leading-relaxed"></div>
    </div>
    <div class="bg-panel rounded-xl border border-slate-800 shadow-lg flex flex-col flex-1 min-h-[300px]">
        <div class="p-4 border-b border-slate-800 bg-slate-900/40"><h3 class="text-white font-medium">RSS Ham Haber Akışı</h3></div>
        <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-dark/20">
            {% for item in contents if item.platform == 'rss' %}
            <div class="p-4 bg-panel/80 rounded-lg border border-slate-700/60"><span class="text-white text-sm font-semibold mb-2 block">{{ item.author_name }}</span><p class="text-sm text-slate-300 whitespace-pre-line">{{ item.text }}</p></div>
            {% endfor %}
        </div>
    </div>
</div>
