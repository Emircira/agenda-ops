<div id="view-polls" class="view-section flex-1 flex flex-col w-full overflow-y-auto p-6 z-10 relative scroll-smooth">
    <div class="bg-panel rounded-xl border border-slate-800 shadow-lg flex flex-col p-6 h-full max-w-5xl mx-auto w-full">
        
        <div class="mb-6 bg-dark/50 p-4 rounded-lg border border-slate-700">
            <div class="flex justify-between items-center mb-3">
                <h4 class="text-white font-bold flex items-center gap-2"><svg class="w-5 h-5 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg> Yeni Anket Verisi</h4>
                <button id="btnExtractPoll" onclick="window.AgendaOps.extractPolls()" class="bg-ai/20 hover:bg-ai/30 text-ai border border-ai/30 px-3 py-1.5 rounded text-xs font-bold transition-colors">🤖 Haberlerden Otonom Çıkar</button>
            </div>
            <p class="text-xs text-slate-400 mb-4">Manuel girmek için kutuları doldurun (Küsüratları nokta ile ayırın, Örn: 33.2) veya yapay zekaya haberlerden aratın.</p>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3">
                <input type="text" id="pollFirm" placeholder="Firma (Örn: ORC)" class="bg-dark border border-slate-600 text-white rounded px-3 py-2 text-sm outline-none focus:border-ai">
                <input type="number" id="pollSample" placeholder="Kişi (Örn: 2500)" class="bg-dark border border-slate-600 text-white rounded px-3 py-2 text-sm outline-none focus:border-ai">
                <input type="number" id="pollCHP" placeholder="CHP %" class="bg-dark border border-slate-600 text-white rounded px-3 py-2 text-sm outline-none focus:border-ai">
                <input type="number" id="pollAKP" placeholder="AKP %" class="bg-dark border border-slate-600 text-white rounded px-3 py-2 text-sm outline-none focus:border-ai">
                <input type="number" id="pollMHP" placeholder="MHP %" class="bg-dark border border-slate-600 text-white rounded px-3 py-2 text-sm outline-none focus:border-ai">
                <input type="number" id="pollDEM" placeholder="DEM %" class="bg-dark border border-slate-600 text-white rounded px-3 py-2 text-sm outline-none focus:border-ai">
                <input type="number" id="pollIYI" placeholder="İYİ %" class="bg-dark border border-slate-600 text-white rounded px-3 py-2 text-sm outline-none focus:border-ai">
                <input type="number" id="pollYRP" placeholder="YRP %" class="bg-dark border border-slate-600 text-white rounded px-3 py-2 text-sm outline-none focus:border-ai">
            </div>
            <button onclick="window.AgendaOps.addPoll()" class="mt-4 w-full bg-ai hover:bg-purple-600 text-white text-sm py-2 rounded-lg font-bold transition-colors">Kaydet ve Grafiği Güncelle</button>
        </div>

        <div class="flex justify-between items-center mb-2">
            <h3 class="text-xl font-bold text-white flex items-center gap-2">Genel Seçim Anketleri</h3>
            <div class="text-xs text-slate-400 bg-dark px-3 py-1.5 rounded-lg border border-slate-700">Canlı Veri</div>
        </div>
        <div class="flex-1 relative w-full min-h-[350px]">
            <canvas id="pollChart"></canvas>
        </div>
    </div>
</div>
