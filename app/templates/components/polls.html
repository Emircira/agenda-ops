<div id="view-polls" class="view-section flex-1 flex flex-col w-full overflow-y-auto p-6 z-10 relative scroll-smooth bg-[#f8f9fa]">
    <div class="bg-panel rounded-xl border border-slate-800 shadow-lg flex flex-col p-6 h-full max-w-5xl mx-auto w-full">
        
        <div class="mb-6 bg-[#f8f9fa] p-4 rounded-xl border border-[#dadce0]">
            <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
                <h4 class="text-[#202124] font-bold flex items-center gap-2"><svg class="w-5 h-5 text-[#137333]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg> Yeni Anket Verisi</h4>
                <button id="btnExtractPoll" onclick="window.AgendaOps.extractPolls()" class="bg-[#e8f0fe] hover:bg-[#d2e3fc] text-[#1967d2] border border-[#dadce0] px-3 py-1.5 rounded text-xs font-bold transition-colors">🤖 Haberlerden Otonom Çıkar</button>
            </div>
            <p class="text-xs text-[#5f6368] mb-4">Manuel girmek için kutuları doldurun (Küsüratları nokta ile ayırın, Örn: 33.2) veya yapay zekaya haberlerden aratın.</p>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3">
                <input type="text" id="pollFirm" placeholder="Firma (Örn: ORC)" class="bg-white border border-[#dadce0] text-[#202124] rounded-lg px-3 py-2 text-sm outline-none focus:border-[#1967d2]">
                <input type="number" id="pollSample" placeholder="Kişi (Örn: 2500)" class="bg-white border border-[#dadce0] text-[#202124] rounded-lg px-3 py-2 text-sm outline-none focus:border-[#1967d2]">
                <input type="number" id="pollCHP" placeholder="CHP %" class="bg-white border border-[#dadce0] text-[#202124] rounded-lg px-3 py-2 text-sm outline-none focus:border-[#1967d2]">
                <input type="number" id="pollAKP" placeholder="AKP %" class="bg-white border border-[#dadce0] text-[#202124] rounded-lg px-3 py-2 text-sm outline-none focus:border-[#1967d2]">
                <input type="number" id="pollMHP" placeholder="MHP %" class="bg-white border border-[#dadce0] text-[#202124] rounded-lg px-3 py-2 text-sm outline-none focus:border-[#1967d2]">
                <input type="number" id="pollDEM" placeholder="DEM %" class="bg-white border border-[#dadce0] text-[#202124] rounded-lg px-3 py-2 text-sm outline-none focus:border-[#1967d2]">
                <input type="number" id="pollIYI" placeholder="İYİ %" class="bg-white border border-[#dadce0] text-[#202124] rounded-lg px-3 py-2 text-sm outline-none focus:border-[#1967d2]">
                <input type="number" id="pollYRP" placeholder="YRP %" class="bg-white border border-[#dadce0] text-[#202124] rounded-lg px-3 py-2 text-sm outline-none focus:border-[#1967d2]">
            </div>
            <button onclick="window.AgendaOps.addPoll()" class="mt-4 w-full bg-[#1967d2] hover:bg-[#1557b0] text-white text-sm py-2 rounded-lg font-bold transition-colors">Kaydet ve Grafiği Güncelle</button>
        </div>

        <div class="flex justify-between items-center mb-2">
            <h3 class="text-xl font-bold text-[#202124] flex items-center gap-2">Genel Seçim Anketleri</h3>
            <div class="text-xs text-[#5f6368] bg-[#f1f3f4] px-3 py-1.5 rounded-lg border border-[#dadce0]">Canlı Veri</div>
        </div>
        <div class="flex-1 relative w-full min-h-[350px]">
            <canvas id="pollChart"></canvas>
        </div>
    </div>
</div>
